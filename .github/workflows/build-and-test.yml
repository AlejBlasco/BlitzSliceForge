name: CI - Build and Test

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch: # Allow manual triggering of the workflow

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '9.0.x' # Use the latest .NET 9.0 SDK

            - name: Restore dependencies
              run: dotnet restore

            - name: Build the solution
              run: dotnet build --no-restore --configuration Release

            - name: Run Code Analysis (linting)
              run: dotnet build --no-restore --configuration Release -p:RunAnalyzersDuringBuild=true -p:TreatWarningsAsErrors=true

            - name: Run unit tests
              run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: coverage-report
                path: ./coverage
